services:
  # ========================
  # DATABASE (MySQL)
  # ========================
  db:
    image: mysql:8.0
    container_name: ayacodia_db
    restart: always
    # Optimized for compatibility with Node/PHP drivers
    command: --default-authentication-plugin=mysql_native_password
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3313:3306"
    volumes:
      - ayacodia_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ayacodia-network

  # ========================
  # BACKEND (Node.js)
  # ========================
  backend:
    build: ./backend
    container_name: ayacodia_backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - MYSQL_HOST=db  # Internal Docker DNS name
      - PORT=5000
    ports:
      - "4005:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ayacodia-network

  # ========================
  # FRONTEND (React/Vite + Nginx)
  # ========================
  frontend:
    build: ./frontend
    container_name: ayacodia_frontend
    restart: always
    ports:
      - "3006:80"
    networks:
      - ayacodia-network

  # ========================
  # PHPMYADMIN
  # ========================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: ayacodia_phpmyadmin
    restart: always
    ports:
      - "8095:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_ARBITRARY=1
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ayacodia-network

volumes:
  ayacodia_mysql_data:

networks:
  ayacodia-network:
    driver: bridge